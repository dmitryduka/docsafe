<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DocSafe</title>
<style>
:root{color-scheme:light dark}
*{box-sizing:border-box}
body{margin:0;font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
 color:#1a1a1a;background:#fafafa}
main{max-width:820px;margin:0 auto;padding:32px 20px 64px}
h1{font-size:1.9rem;margin:.2em 0 .1em}
h2{font-size:1.25rem;margin:1.6em 0 .4em;border-bottom:1px solid #e2e2e2;padding-bottom:.2em}
h3{font-size:1.05rem;margin:1.2em 0 .3em}
a{color:#0b6bcb}
ul{padding-left:1.3em}
.updated{color:#666;font-size:.95rem}
hr{border:0;border-top:1px solid #e2e2e2;margin:2em 0}
.back{display:inline-block;margin-bottom:1.5em;font-size:.95rem}
@media (prefers-color-scheme: dark){
 body{background:#121212;color:#e6e6e6}
 h2{border-color:#333}hr{border-color:#333}a{color:#5aa9ff}.updated{color:#9a9a9a}
}
</style>
</head>
<body>
<main>
<h1>DocSafe</h1>
<p>DocSafe is a private, offline-first encrypted document vault for Android. It requests no
internet permission; your documents never leave your device unless you explicitly export them.</p>
<h2>Links</h2>
<ul>
<li><a href="./privacy-policy.html">Privacy Policy</a></li>
<li><a href="https://github.com/dmitryduka/docsafe">Source code &amp; releases</a></li>
</ul>
</main>
</body>
</html>
